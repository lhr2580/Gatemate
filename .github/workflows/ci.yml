name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        
    - name: Install Frontend Dependencies
      run: pnpm install
      
    - name: Build Frontend
      run: pnpm build
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      
    - name: Build
      run: cargo build --manifest-path src-tauri/Cargo.toml

  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      
    - name: Run Core Tests
      run: cargo test --tests --manifest-path src-tauri/gatemate-core/Cargo.toml
      
    - name: Run Plugin API Tests
      run: cargo test --tests --manifest-path src-tauri/gatemate-plugin-api/Cargo.toml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
        
    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      
    - name: Run Clippy
      run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Run Cargo Audit
      uses: rustsec/audit-check@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}